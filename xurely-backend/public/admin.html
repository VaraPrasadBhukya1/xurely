<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xurely · Admin Dashboard</title>
<style>
  :root {
    --green:#0f8a5f; --green-d:#0a6e4b; --bg:#f4f6f8; --card:#fff;
    --ink:#1f2933; --muted:#6b7785; --line:#e3e8ee; --urgent:#c62828; --amber:#b76e00;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--ink); }
  header { background:var(--green); color:#fff; padding:14px 22px; display:flex;
           align-items:center; justify-content:space-between; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .sub { opacity:.85; font-size:12px; }
  header button { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.4);
                  padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  header button:hover { background:rgba(255,255,255,.28); }
  main { max-width:1100px; margin:0 auto; padding:22px; }

  /* login */
  #login { max-width:380px; margin:80px auto; background:var(--card); padding:28px;
           border-radius:12px; box-shadow:0 6px 24px rgba(0,0,0,.06); }
  #login h2 { margin:0 0 6px; }
  #login p { color:var(--muted); font-size:13px; margin:0 0 18px; }
  #login input { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  #login button { margin-top:14px; width:100%; background:var(--green); color:#fff; border:0;
                  padding:12px; border-radius:8px; font-size:15px; cursor:pointer; }
  #login .err { color:var(--urgent); font-size:13px; margin-top:10px; min-height:16px; }

  /* stats */
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:24px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .stat .n { font-size:26px; font-weight:700; }
  .stat .l { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; margin-top:4px; }

  section { background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:24px; overflow:hidden; }
  .sec-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--line); }
  .sec-head h3 { margin:0; font-size:15px; }
  .sec-head select { padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:13px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:11px 18px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  tr:last-child td { border-bottom:0; }
  .empty { padding:24px 18px; color:var(--muted); font-size:13px; }

  .badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; }
  .b-urgent { background:#fdecea; color:var(--urgent); }
  .b-normal { background:#eef1f4; color:var(--muted); }
  .b-open { background:#fff3e0; color:var(--amber); }
  .b-prog { background:#e3f2fd; color:#1565c0; }
  .b-closed { background:#e8f5e9; color:var(--green-d); }
  .b-pending { background:#fff3e0; color:var(--amber); }
  .b-confirmed { background:#e3f2fd; color:#1565c0; }
  .b-completed { background:#e8f5e9; color:var(--green-d); }
  .b-cancelled,.b-no_show { background:#fdecea; color:var(--urgent); }

  .act { background:#fff; border:1px solid var(--line); border-radius:6px; padding:5px 9px;
         font-size:12px; cursor:pointer; margin-right:6px; }
  .act:hover { border-color:var(--green); color:var(--green-d); }

  /* manual send */
  .send-form { padding:16px 18px; display:grid; grid-template-columns:200px 1fr auto; gap:10px; align-items:start; }
  .send-form input, .send-form textarea { padding:9px 10px; border:1px solid var(--line); border-radius:7px; font-size:13px; font-family:inherit; }
  .send-form textarea { resize:vertical; min-height:38px; }
  .send-form button { background:var(--green); color:#fff; border:0; padding:9px 16px; border-radius:7px; cursor:pointer; }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--ink); color:#fff; padding:11px 16px;
           border-radius:8px; font-size:13px; opacity:0; transform:translateY(8px); transition:.2s; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }
  .muted { color:var(--muted); }
  @media (max-width:640px){ .send-form{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>Xurely Admin</h2>
  <p>Enter your admin API key to continue.</p>
  <input id="keyInput" type="password" placeholder="x-admin-key" autocomplete="off" />
  <button id="loginBtn">Sign in</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none">
  <header>
    <div>
      <h1>Xurely · Admin Dashboard</h1>
      <div class="sub">Dr. Vita Multispeciality Dental Clinic</div>
    </div>
    <div>
      <button id="refreshBtn">↻ Refresh</button>
      <button id="logoutBtn">Sign out</button>
    </div>
  </header>

  <main>
    <div class="stats" id="stats"></div>

    <section>
      <div class="sec-head">
        <h3>🤝 Support Queue</h3>
        <select id="ticketFilter">
          <option value="OPEN">Open</option>
          <option value="IN_PROGRESS">In progress</option>
          <option value="CLOSED">Closed</option>
          <option value="ALL">All</option>
        </select>
      </div>
      <div id="tickets"></div>
    </section>

    <section>
      <div class="sec-head"><h3>📅 Appointments</h3></div>
      <div id="appts"></div>
    </section>

    <section>
      <div class="sec-head"><h3>✉️ Send a WhatsApp message</h3></div>
      <div class="send-form">
        <input id="sendPhone" placeholder="Phone (e.g. 919876543210)" />
        <textarea id="sendMsg" placeholder="Message…"></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY_STORE = 'xurely_admin_key';
let apiKey = localStorage.getItem(KEY_STORE) || '';

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

async function api(path, opts = {}) {
  const res = await fetch('/api/admin' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'x-admin-key': apiKey, ...(opts.headers || {}) },
  });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (!res.ok) throw new Error('Request failed (' + res.status + ')');
  return res.status === 204 ? null : res.json();
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
}

// ── RENDERERS ────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await api('/stats');
    $('stats').innerHTML = `
      <div class="stat"><div class="n">${s.appointments.total}</div><div class="l">Appointments</div></div>
      <div class="stat"><div class="n">${s.appointments.confirmed}</div><div class="l">Confirmed</div></div>
      <div class="stat"><div class="n">${s.appointments.completed}</div><div class="l">Completed</div></div>
      <div class="stat"><div class="n">${s.appointments.noShow}</div><div class="l">No-shows</div></div>
      <div class="stat"><div class="n">${s.patients}</div><div class="l">Patients</div></div>
      <div class="stat"><div class="n">${s.avgRating}</div><div class="l">Avg rating</div></div>`;
  } catch (e) { /* handled by logout / toast elsewhere */ }
}

async function loadTickets() {
  const status = $('ticketFilter').value;
  const box = $('tickets');
  try {
    const list = await api('/support-tickets?status=' + status);
    if (!list.length) { box.innerHTML = '<div class="empty">No tickets.</div>'; return; }
    box.innerHTML = `<table><thead><tr>
      <th>When</th><th>Patient</th><th>Category</th><th>Priority</th><th>Enquiry</th><th>Status</th><th>Actions</th>
      </tr></thead><tbody>${list.map(t => `
      <tr>
        <td class="muted">${fmtDate(t.createdAt)}</td>
        <td>${esc(t.name || t.patientId?.name || '—')}<br><span class="muted">${esc(t.phone)}</span></td>
        <td>${esc(t.category)}</td>
        <td><span class="badge ${t.priority === 'URGENT' ? 'b-urgent' : 'b-normal'}">${esc(t.priority)}</span></td>
        <td>${esc(t.enquiryText || '—')}</td>
        <td><span class="badge b-${t.status.toLowerCase().replace('_','')}">${esc(t.status)}</span></td>
        <td>
          ${t.status !== 'IN_PROGRESS' ? `<button class="act" data-ticket="${t._id}" data-st="IN_PROGRESS">Pick up</button>` : ''}
          ${t.status !== 'CLOSED' ? `<button class="act" data-ticket="${t._id}" data-st="CLOSED">Close</button>` : ''}
        </td>
      </tr>`).join('')}</tbody></table>`;

    box.querySelectorAll('button[data-ticket]').forEach(b => b.onclick = async () => {
      try {
        await api('/support-tickets/' + b.dataset.ticket + '/status', {
          method: 'POST', body: JSON.stringify({ status: b.dataset.st }),
        });
        toast('Ticket → ' + b.dataset.st);
        loadTickets();
      } catch (e) { toast(e.message); }
    });
  } catch (e) { box.innerHTML = '<div class="empty">Could not load tickets.</div>'; }
}

async function loadAppts() {
  const box = $('appts');
  try {
    const list = await api('/appointments');
    if (!list.length) { box.innerHTML = '<div class="empty">No appointments.</div>'; return; }
    box.innerHTML = `<table><thead><tr>
      <th>When</th><th>Patient</th><th>Doctor</th><th>Status</th><th>Payment</th><th>Actions</th>
      </tr></thead><tbody>${list.map(a => `
      <tr>
        <td>${fmtDate(a.appointmentDatetime)}</td>
        <td>${esc(a.patientId?.name || '—')}<br><span class="muted">${esc(a.patientId?.phone || '')}</span></td>
        <td>${esc(a.doctorId?.name || '—')}</td>
        <td><span class="badge b-${(a.status||'').toLowerCase()}">${esc(a.status)}</span></td>
        <td><span class="badge b-${(a.paymentStatus||'').toLowerCase()}">${esc(a.paymentStatus)}</span></td>
        <td>${a.status !== 'COMPLETED' ? `<button class="act" data-appt="${a._id}">Mark complete</button>` : '<span class="muted">—</span>'}</td>
      </tr>`).join('')}</tbody></table>`;

    box.querySelectorAll('button[data-appt]').forEach(b => b.onclick = async () => {
      if (!confirm('Mark complete and send the review request?')) return;
      try {
        await api('/appointments/' + b.dataset.appt + '/complete', { method: 'POST' });
        toast('Marked complete · review sent');
        loadAppts(); loadStats();
      } catch (e) { toast(e.message); }
    });
  } catch (e) { box.innerHTML = '<div class="empty">Could not load appointments.</div>'; }
}

function loadAll() { loadStats(); loadTickets(); loadAppts(); }

// ── AUTH ───────────────────────────────────────────────────────────────────────
function showDash() { $('login').style.display = 'none'; $('dash').style.display = 'block'; loadAll(); }
function logout() {
  localStorage.removeItem(KEY_STORE); apiKey = '';
  $('dash').style.display = 'none'; $('login').style.display = 'block';
  $('keyInput').value = ''; $('loginErr').textContent = '';
}

async function attemptLogin(key) {
  apiKey = key;
  try {
    await api('/stats');              // probe — 401 throws
    localStorage.setItem(KEY_STORE, key);
    showDash();
  } catch (e) {
    apiKey = '';
    $('loginErr').textContent = e.message === 'Unauthorized' ? 'Invalid key.' : e.message;
  }
}

$('loginBtn').onclick = () => { const k = $('keyInput').value.trim(); if (k) attemptLogin(k); };
$('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtn').click(); });
$('logoutBtn').onclick = logout;
$('refreshBtn').onclick = loadAll;
$('ticketFilter').onchange = loadTickets;
$('sendBtn').onclick = async () => {
  const phone = $('sendPhone').value.trim(), message = $('sendMsg').value.trim();
  if (!phone || !message) { toast('Phone and message required'); return; }
  try {
    await api('/send-message', { method: 'POST', body: JSON.stringify({ phone, message }) });
    toast('Message sent'); $('sendMsg').value = '';
  } catch (e) { toast(e.message); }
};

// auto-login if a key is already stored
if (apiKey) attemptLogin(apiKey); else $('keyInput').focus();
</script>
</body>
</html>
